name: Deploy NuGet Package

on:
  workflow_dispatch:  # Enables manual trigger
  push:
    tags:
      - 'v*'  # Triggers on version tags like v2.0.0

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore SqlOM.csproj

      - name: Build
        run: dotnet build SqlOM.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test SqlOM.Tests/SqlOM.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack SqlOM.csproj --configuration Release --no-build -o ./nupkg

      - name: Push to NuGet
        run: |
          Get-ChildItem -Path nupkg -Filter *.nupkg | ForEach-Object {
            Write-Host "Pushing $($_.Name)"
            dotnet nuget push $_.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
